<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>삼국유사 시간여행 지도 v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#241c14;
    --sky-deep:#141b30;
    --cloud:#f2e8d5;
    --clay:#c1440e;
    --clay-soft:#e2725b;
    --teal:#2f6f62;
    --gold:#e3a72f;
    --indigo:#2b3a67;
    --stone:#8b7d9b;
    --paper:#fbf3df;
    --line:#241c14;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Gowun Dodum', sans-serif;
    background:
      radial-gradient(ellipse at 20% 0%, #2b3a67 0%, transparent 55%),
      radial-gradient(ellipse at 90% 10%, #3a2b4f 0%, transparent 45%),
      var(--sky-deep);
    color:var(--cloud);
    min-height:100%;
    overflow-x:hidden;
  }
  .app{ max-width:1180px; margin:0 auto; padding:18px 14px 40px; }

  header{ text-align:center; padding:10px 0 20px; }
  header h1{
    font-family:'Do Hyeon', sans-serif;
    font-size:clamp(28px, 5.5vw, 46px);
    letter-spacing:1px; margin:0 0 6px; color:var(--gold);
    text-shadow: 0 2px 0 rgba(0,0,0,.35);
  }
  header p{ margin:0; font-size:clamp(14px,2.6vw,17px); color:#cfd6ea; opacity:.9; }

  .timeline-outer{ position:relative; margin:18px 0 22px; }
  .timeline-track{
    position:relative; display:flex; gap:10px; overflow-x:auto;
    padding:14px 8px 18px; scroll-behavior:smooth; -webkit-overflow-scrolling:touch;
  }
  .timeline-track::-webkit-scrollbar{height:8px;}
  .timeline-track::-webkit-scrollbar-thumb{background:#4a5a86;border-radius:8px;}
  .timeline-track::before{
    content:""; position:absolute; left:8px; right:8px; top:36px; height:4px;
    background:repeating-linear-gradient(90deg, var(--gold) 0 10px, transparent 10px 16px);
    opacity:.55; z-index:0;
  }
  .era-btn{
    position:relative; z-index:1; flex:0 0 auto; width:104px;
    background:var(--indigo); border:3px solid transparent; border-radius:16px;
    color:var(--cloud); padding:10px 6px 8px; cursor:pointer;
    font-family:'Gowun Dodum', sans-serif; text-align:center;
    transition: transform .15s ease, box-shadow .15s ease, background .15s ease, border-color .15s ease;
    box-shadow: 0 3px 0 rgba(0,0,0,.35);
  }
  .era-btn .yr{ display:block; font-family:'Do Hyeon', sans-serif; font-size:14px; color:var(--gold); margin-bottom:3px; }
  .era-btn .lb{ display:block; font-size:13px; line-height:1.25; }
  .era-btn:hover{ transform:translateY(-2px); }
  .era-btn.active{
    background:var(--clay); border-color:var(--gold);
    transform:translateY(-4px) scale(1.04); box-shadow: 0 6px 0 rgba(0,0,0,.4);
  }
  .arrow-btn{
    position:absolute; top:50%; transform:translateY(-50%); width:38px; height:38px;
    border-radius:50%; border:none; background:var(--gold); color:var(--ink);
    font-size:18px; cursor:pointer; box-shadow:0 3px 0 rgba(0,0,0,.35); z-index:2;
  }
  .arrow-btn:active{ transform:translateY(-50%) scale(.92); }
  .arrow-left{ left:-6px; }
  .arrow-right{ right:-6px; }
  @media (max-width:640px){ .arrow-btn{ display:none; } }

  .stage{ display:grid; grid-template-columns: 1.1fr 1fr; gap:18px; align-items:start; }
  @media (max-width:860px){ .stage{ grid-template-columns:1fr; } }

  .map-panel{
    background: linear-gradient(180deg, #24345c, #182747);
    border-radius:22px; padding:14px; border:3px solid #3a4d80; position:relative;
  }
  .map-caption{ text-align:center; font-size:13px; color:#b9c3e0; margin:0 0 8px; }
  .map-svg-wrap{
    position:relative; border-radius:16px; overflow:hidden;
    background:
      radial-gradient(ellipse at 48% 18%, rgba(81,114,94,.35), transparent 38%),
      radial-gradient(ellipse at 54% 58%, rgba(81,114,94,.32), transparent 48%),
      linear-gradient(180deg, #1d5c83, #174a73 48%, #123a63);
  }
  .era-map-image{ width:100%; height:auto; display:block; }
  svg#map{ display:none; }
  .sea-wash{ fill:url(#seaGrad); }
  .land-base{ fill:#b6a06d; stroke:#2b281f; stroke-width:2.2; opacity:.95; filter:url(#paperRough); }
  .land-shadow{ fill:#6f7a4d; opacity:.22; filter:url(#paperRough); }
  .river{ fill:none; stroke:#275f84; stroke-width:2; stroke-linecap:round; opacity:.58; }
  .coast-note{ fill:none; stroke:#e7d8a8; stroke-width:1.2; stroke-dasharray:3 6; opacity:.34; }

  .territory{ transition: opacity .7s ease, transform .7s ease; transform-origin:center; transform-box:fill-box; }
  .mood-hidden{ opacity:0; }
  .mood-founding{ opacity:.76; transform:scale(.55); }
  .mood-normal{ opacity:.74; }
  .mood-fading{ opacity:.34; filter:grayscale(45%); }
  .mood-fallen{ opacity:.16; filter:grayscale(90%); }

  .sea-label text{ font-family:'Gowun Dodum', sans-serif; font-size:13px; fill:#9fb3d9; font-style:italic; }
  .city-dot circle{ fill:#fff9ec; stroke:var(--ink); stroke-width:1.4; }
  .city-dot text{ font-family:'Gowun Dodum', sans-serif; font-size:10.5px; fill:#f2e8d5; }
  .far-region .fbox{ fill:#241c1c; fill-opacity:.35; stroke:#9fb3d9; stroke-width:1; stroke-dasharray:2 3; }
  .far-region text{ font-family:'Gowun Dodum', sans-serif; font-size:10.5px; fill:#cfd6ea; }

  .kingdom-label text{
    font-family:'Do Hyeon', sans-serif; font-size:15px; fill:#fffaf0;
    paint-order:stroke; stroke:#241c14; stroke-width:3.5px;
  }
  .king-tag{ transition: opacity .5s ease; pointer-events:none; }
  .king-tag text{
    font-family:'Do Hyeon', sans-serif; font-size:12px; fill:#fffaf0;
    paint-order:stroke; stroke:#241c14; stroke-width:3px;
  }
  .foreign-tag{ transition:opacity .5s ease; }
  .foreign-tag .fbox{ fill:#241c1c; fill-opacity:.6; stroke:var(--stone); stroke-width:1.4; }
  .foreign-tag text{ font-family:'Gowun Dodum', sans-serif; font-size:11px; fill:#e9e2f2; }

  .legend{ display:flex; flex-wrap:wrap; gap:10px 16px; justify-content:center; margin-top:10px; font-size:12px; color:#cfd6ea; }
  .legend span{ display:inline-flex; align-items:center; gap:6px; }
  .legend i{ width:12px; height:12px; border-radius:3px; display:inline-block; }

  .cards-panel{
    background:var(--paper); border-radius:22px; padding:16px; color:var(--ink);
    min-height:340px; border:3px solid #d8c9a3;
  }
  .cards-title{ font-family:'Do Hyeon', sans-serif; font-size:20px; margin:2px 4px 12px; color:var(--indigo); }
  .story-art{
    display:none;
    margin:0 0 14px;
    border:2.5px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    background:#eadfc6;
    box-shadow:3px 4px 0 rgba(36,28,20,.18);
    cursor:pointer;
    position:relative;
  }
  .story-art:focus-visible{ outline:4px solid var(--gold); outline-offset:3px; }
  .story-art::after{
    content:"크게 보기";
    position:absolute;
    right:10px;
    bottom:10px;
    padding:4px 9px;
    border-radius:999px;
    background:rgba(36,28,20,.78);
    color:#fffaf0;
    font-size:12px;
    box-shadow:0 2px 0 rgba(0,0,0,.22);
    opacity:0;
    transform:translateY(4px);
    transition:opacity .15s ease, transform .15s ease;
  }
  .story-art:hover::after,
  .story-art:focus-visible::after{ opacity:1; transform:translateY(0); }
  .story-art img{
    display:block;
    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
  }
  .image-modal{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    padding:22px;
    background:rgba(9,12,22,.82);
    z-index:20;
  }
  .image-modal.open{ display:flex; }
  .image-modal-dialog{
    position:relative;
    width:min(1120px, 100%);
    max-height:calc(100vh - 44px);
  }
  .image-modal img{
    display:block;
    width:100%;
    max-height:calc(100vh - 44px);
    object-fit:contain;
    border-radius:16px;
    border:3px solid #d8c9a3;
    background:#eadfc6;
    box-shadow:0 18px 50px rgba(0,0,0,.45);
  }
  .image-modal-close{
    position:absolute;
    top:10px;
    right:10px;
    width:38px;
    height:38px;
    border:2px solid rgba(255,250,240,.82);
    border-radius:50%;
    background:rgba(36,28,20,.82);
    color:#fffaf0;
    font-size:24px;
    line-height:1;
    cursor:pointer;
  }
  .card-list{ display:flex; flex-direction:column; gap:12px; }
  .event-card{
    border-radius:16px; padding:12px 14px; border:2.5px solid var(--line);
    background:#fff; box-shadow:3px 4px 0 rgba(36,28,20,.18); animation: pop .35s ease both;
  }
  @keyframes pop{ from{ opacity:0; transform:translateY(8px) scale(.98); } to{ opacity:1; transform:translateY(0) scale(1); } }
  .event-card .top-row{
    display:grid;
    grid-template-columns:52px 30px minmax(0,1fr) auto;
    align-items:center;
    gap:8px;
    margin-bottom:6px;
  }
  .portrait-thumb{
    width:52px;
    height:52px;
    border-radius:50%;
    border:2px solid var(--line);
    object-fit:cover;
    box-shadow:0 2px 0 rgba(36,28,20,.18);
    background:#eadfc6;
  }
  .crest{
    width:30px;height:30px;border-radius:50%; display:flex;align-items:center;justify-content:center;
    font-size:16px; border:2px solid var(--line); flex:0 0 auto;
  }
  .king-name{ font-family:'Do Hyeon', sans-serif; font-size:17px; min-width:0; overflow-wrap:anywhere; }
  .kingdom-chip{ font-size:11px; padding:2px 8px; border-radius:999px; border:1.5px solid var(--line); margin-left:auto; white-space:nowrap; }
  .event-text{ font-size:15.5px; line-height:1.5; margin:0; }
  .event-card.foreign{ border-style:dashed; background:#fff9ec; }
  .foreign-note{ display:inline-block; font-size:11px; background:var(--indigo); color:#fff; padding:2px 8px; border-radius:999px; margin-bottom:6px; }

  .c-silla   { --kc: var(--clay-soft); }
  .c-goguryeo{ --kc: var(--indigo); }
  .c-baekje  { --kc: var(--teal); }
  .c-gaya    { --kc: var(--gold); }
  .c-foreign { --kc: var(--stone); }
  .event-card{ border-left:8px solid var(--kc); }
  .crest{ background:var(--kc); color:#fff; }
  .kingdom-chip{ background:var(--kc); color:#fff; border-color:var(--kc); }
  @media (max-width:420px){
    .event-card .top-row{ grid-template-columns:48px 28px minmax(0,1fr); }
    .portrait-thumb{ width:48px; height:48px; }
    .kingdom-chip{ grid-column:3; justify-self:start; margin-left:0; }
  }

  footer.credit{ text-align:center; margin-top:26px; font-size:12px; color:#8a94b8; }
</style>
</head>
<body>
<div class="app">

  <header>
    <h1>🏺 삼국유사 시간여행 지도</h1>
    <p>시간 버튼을 눌러 가야 · 신라 · 백제 · 고구려가 넓어지고 좁아지는 모습을 만나 보세요</p>
  </header>

  <div class="timeline-outer">
    <button class="arrow-btn arrow-left" id="prevBtn" aria-label="이전">◀</button>
    <div class="timeline-track" id="timelineTrack"></div>
    <button class="arrow-btn arrow-right" id="nextBtn" aria-label="다음">▶</button>
  </div>

  <div class="stage">
    <div class="map-panel">
      <p class="map-caption">📍 실제 지도 모양에 맞춰, 나라의 넓이를 알기 쉽게 표시했어요</p>
      <div class="map-svg-wrap">
        <img class="era-map-image" id="eraMapImage" src="assets/era-maps/era-01.png" alt="시대별 삼국 지도">
        <svg id="map" viewBox="0 0 480 640" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="seaGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#24668c"/>
              <stop offset="55%" stop-color="#1b557d"/>
              <stop offset="100%" stop-color="#143d66"/>
            </linearGradient>
            <filter id="rough" x="-20%" y="-20%" width="140%" height="140%">
              <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="7" result="noise"/>
              <feDisplacementMap in="SourceGraphic" in2="noise" scale="7"/>
            </filter>
            <filter id="paperRough" x="-10%" y="-10%" width="120%" height="120%">
              <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="4" result="paper"/>
              <feDisplacementMap in="SourceGraphic" in2="paper" scale="2.5"/>
            </filter>
          </defs>

          <rect class="sea-wash" width="480" height="640"/>

          <!-- fixed basemap: simplified Korea + Manchuria coordinate layer -->
          <path class="land-shadow" d="M52,0 L448,0 L448,178 C420,170 390,162 360,150
                   C346,178 344,212 360,246 C388,305 390,372 364,430
                   C350,462 354,498 336,532 C312,576 268,610 218,620
                   C170,630 126,608 104,568 C82,528 82,476 98,430
                   C112,386 116,342 100,302 C82,254 64,210 64,162
                   C64,104 76,54 52,0 Z"/>
          <path class="land-base" d="M46,0 L446,0 L446,164
                   C424,160 400,154 374,144 C348,134 324,130 300,136
                   C292,160 302,184 320,210 C350,254 366,304 362,354
                   C358,398 336,432 330,472 C326,504 306,540 274,568
                   C238,600 190,612 150,592 C116,576 96,542 92,500
                   C88,456 100,414 110,376 C120,338 110,304 94,270
                   C76,232 62,188 64,142 C66,98 78,52 46,0 Z"/>
          <path class="land-base" d="M338,0 L480,0 L480,230 C454,226 430,218 410,202
                   C390,184 372,168 350,158 C364,112 360,58 338,0 Z" opacity=".72"/>
          <path class="land-base" d="M184,604 C218,590 256,602 262,622 C250,638 204,642 178,630 C164,622 166,612 184,604 Z" opacity=".78"/>
          <ellipse class="land-base" cx="421" cy="357" rx="7" ry="8" opacity=".8"/>
          <path class="coast-note" d="M64,142 C66,98 78,52 46,0 M320,210 C350,254 366,304 362,354
                   C358,398 336,432 330,472 C326,504 306,540 274,568
                   C238,600 190,612 150,592"/>
          <path class="river" d="M300,136 C284,160 266,188 244,216 C222,244 204,270 190,298"/>
          <path class="river" d="M96,270 C128,280 164,292 206,310 C240,324 274,342 318,354"/>
          <path class="river" d="M128,408 C160,418 190,424 222,436"/>
          <path class="river" d="M316,486 C302,498 288,512 276,532"/>

          <!-- ============ TERRITORY SHAPES ============ -->

          <!-- GOGURYEO -->
          <path id="t-goguryeo-normal" class="territory mood-hidden" filter="url(#rough)"
                d="M54,0 L372,0 C388,42 382,82 354,112
                   C330,138 302,150 292,178 C282,208 254,238 214,258
                   C180,276 148,264 126,236 C108,214 88,206 66,214
                   C62,186 62,158 66,130 C72,84 82,42 54,0 Z"
                fill="var(--indigo)" stroke="var(--line)" stroke-width="3"/>
          <path id="t-goguryeo-peak" class="territory mood-hidden" filter="url(#rough)"
                d="M54,0 L374,0 C390,42 384,82 356,114
                   C334,140 314,158 320,194 C326,232 314,270 286,306
                   C270,328 266,348 284,370 C252,386 214,380 180,360
                   C146,340 116,330 88,338 C78,306 82,270 104,232
                   C82,218 66,196 66,164 C70,116 82,58 54,0 Z"
                fill="var(--indigo)" stroke="var(--line)" stroke-width="3"/>

          <!-- BAEKJE -->
          <path id="t-baekje-normal" class="territory mood-hidden" filter="url(#rough)"
                d="M112,354 C144,336 184,340 214,366 C238,390 240,424 228,458
                   C218,486 228,508 252,522 C222,542 178,548 144,530
                   C110,512 92,480 96,442 C100,404 96,376 112,354 Z"
                fill="var(--teal)" stroke="var(--line)" stroke-width="3"/>
          <path id="t-baekje-peak" class="territory mood-hidden" filter="url(#rough)"
                d="M88,304 C126,282 178,286 218,312 C256,338 274,378 266,422
                   C258,464 270,494 300,516 C264,542 216,552 170,536
                   C126,520 96,490 90,448 C84,406 82,352 88,304 Z"
                fill="var(--teal)" stroke="var(--line)" stroke-width="3"/>

          <!-- SILLA -->
          <path id="t-silla-normal" class="territory mood-hidden" filter="url(#rough)"

          <path id="t-silla-peak" class="territory mood-hidden" filter="url(#rough)"

                   C368,462 364,510 332,544 C304,574 256,578 222,552
                   C196,532 188,498 202,466 C180,454 168,432 174,402
                   C180,370 204,350 230,344 C232,328 240,318 258,312 Z"
                fill="var(--clay-soft)" stroke="var(--line)" stroke-width="3"/>
          <path id="t-silla-unified" class="territory mood-hidden" filter="url(#rough)"
                d="M126,282 C174,258 230,264 274,296 C318,328 348,378 356,430
                   C364,486 340,540 298,574 C258,606 202,614 156,590
                   C116,568 94,530 90,482 C86,436 94,390 108,348
                   C116,322 114,300 126,282 Z"
                fill="var(--clay-soft)" stroke="var(--line)" stroke-width="3"/>

          <!-- GAYA -->
          <path id="t-gaya-normal" class="territory mood-hidden" filter="url(#rough)"
                d="M218,472 C240,456 274,456 296,474 C314,492 306,520 284,536
                   C260,552 228,546 212,524 C198,504 200,486 218,472 Z"
                fill="var(--gold)" stroke="var(--line)" stroke-width="3"/>

          <!-- ============ static geography ============ -->
          <g class="sea-label"><text x="392" y="255">동해</text></g>
          <g class="sea-label"><text x="40" y="330">황해</text></g>
          <g class="city-dot"><circle cx="421" cy="357" r="3"/><text x="427" y="361">우산</text></g>
          <g class="city-dot"><circle cx="210" cy="622" r="0"/><text x="190" y="626">탐라</text></g>
          <g class="far-region"><rect class="fbox" x="10" y="95" width="72" height="26" rx="8"/><text x="46" y="112" text-anchor="middle">요서지방</text></g>
          <g class="far-region"><rect class="fbox" x="10" y="255" width="76" height="26" rx="8"/><text x="48" y="272" text-anchor="middle">산둥반도</text></g>
          <g class="far-region"><rect class="fbox" x="415" y="552" width="46" height="24" rx="8"/><text x="438" y="568" text-anchor="middle">왜</text></g>

          <!-- capital city dots (always shown for context) -->
          <g class="city-dot"><circle cx="306" cy="110" r="3"/><text x="268" y="105">국내성</text></g>
          <g class="city-dot"><circle cx="224" cy="252" r="3"/><text x="186" y="247">평양성</text></g>
          <g class="city-dot"><circle cx="238" cy="342" r="3"/><text x="244" y="338">위례성</text></g>
          <g class="city-dot"><circle cx="174" cy="424" r="3"/><text x="102" y="429">웅진·사비</text></g>
          <g class="city-dot"><circle cx="312" cy="496" r="3"/><text x="318" y="493">금성</text></g>
          <g class="city-dot"><circle cx="260" cy="520" r="2.4"/><text x="226" y="542">금관가야</text></g>

          <!-- kingdom name labels -->
          <g class="kingdom-label" id="label-goguryeo" style="opacity:0"><text x="220" y="170" text-anchor="middle">고구려</text></g>
          <g class="kingdom-label" id="label-baekje" style="opacity:0"><text x="166" y="440" text-anchor="middle">백제</text></g>
          <g class="kingdom-label" id="label-silla" style="opacity:0"><text x="300" y="490" text-anchor="middle">신라</text></g>
          <g class="kingdom-label" id="label-gaya" style="opacity:0"><text x="256" y="504" text-anchor="middle" font-size="11">가야</text></g>

          <!-- king tags -->
          <g class="king-tag" id="king-goguryeo" style="opacity:0"><text x="220" y="190" text-anchor="middle"></text></g>
          <g class="king-tag" id="king-baekje" style="opacity:0"><text x="166" y="460" text-anchor="middle"></text></g>
          <g class="king-tag" id="king-silla" style="opacity:0"><text x="300" y="510" text-anchor="middle"></text></g>

          <!-- foreign markers -->

            {k:'silla', king:'김유신 장군', icon:'⭐', text:'신라의 이름난 장군 김유신이 백제를 무너뜨렸어요.', foreign:true} ],
    foreign:['tang'] },

  { id:17, yr:"668년", short:"고구려\n멸망", title:"고구려 이야기의 끝",
    map:{ goguryeo:{v:'normal',m:'fallen'}, silla:{v:'peak',m:'normal'} },
    cards:[ {k:'goguryeo', king:'연개소문의 아들들', icon:'😞', text:'연개소문이 세상을 떠난 뒤 아들들이 서로 다투다가 고구려가 무너지고 말았어요.'} ],
    foreign:['tang'] },

  { id:18, yr:"676년", short:"신라\n삼국통일", title:"세 나라를 하나로 — 문무왕",
    map:{ silla:{v:'unified',m:'normal'} },
    cards:[ {k:'silla', king:'문무왕', icon:'🎉', text:'마침내 신라, 백제, 고구려 땅을 하나로 합쳤어요. 지도에서 신라 땅이 제일 커졌어요!'} ] },

  { id:19, yr:"828~841년 · 보너스", short:"통일신라\n장보고", title:"바다를 지킨 영웅 — 장보고",
    map:{ silla:{v:'unified',m:'normal'} },
    cards:[ {k:'silla', king:'장보고', icon:'⛵', text:'청해진을 세우고 바다의 도적을 물리치며 바닷길을 안전하게 지켰어요.'} ] },
];

const KINGDOM_NAME = { silla:'신라', goguryeo:'고구려', baekje:'백제', gaya:'가야', foreign:'다른 나라' };
const PORTRAIT_SRC = {
  goguryeo:'assets/images/portrait-goguryeo.png',
  baekje:'assets/images/portrait-baekje.png',
  silla:'assets/images/portrait-silla.png',
  gaya:'assets/images/portrait-gaya.png',
  foreign:'assets/images/portrait-foreign.png'
};
const KINGDOMS = ['goguryeo','baekje','silla','gaya'];
const VARIANTS = {
  goguryeo:['normal','peak'],
  baekje:['normal','peak'],
  silla:['normal','peak','unified'],
  gaya:['normal']
};
const ALL_FOREIGN = ['buyeo','dongbuyeo','huyeon','sushen','khitan','sui','tang'];

let current = 0;

function buildTimeline(){
  const track = document.getElementById('timelineTrack');
  track.innerHTML = '';
  ERAS.forEach((e, i)=>{
    const b = document.createElement('button');
    b.className = 'era-btn';
    b.innerHTML = `<span class="yr">${e.yr.split('·')[0].trim()}</span><span class="lb">${e.short.replace('\n','<br>')}</span>`;
    b.addEventListener('click', ()=> setEra(i));
    track.appendChild(b);
  });
}

function setKingdomState(kingdom, cfg){
  VARIANTS[kingdom].forEach(v=>{
    const el = document.getElementById(`t-${kingdom}-${v}`);
    if(!el) return;
    el.classList.remove('mood-hidden','mood-founding','mood-normal','mood-fading','mood-fallen');
    if(cfg && cfg.v === v){
      el.classList.add('mood-' + cfg.m);
    } else {
      el.classList.add('mood-hidden');
    }
  });
}

function showLabel(id, show){
  const l = document.getElementById('label-'+id);
  if(l) l.style.opacity = show ? 1 : 0;
}
function updateKing(id, king){
  const g = document.getElementById('king-'+id);
  if(!g) return;
  const t = g.querySelector('text');
  if(king){ t.textContent = king; g.style.opacity = 1; }
  else { g.style.opacity = 0; }
}

function portraitFor(card){
  return PORTRAIT_SRC[card.foreign ? 'foreign' : card.k] || PORTRAIT_SRC.foreign;
}

function render(){
  const era = ERAS[current];
  const mapImage = document.getElementById('eraMapImage');
  if(mapImage){
    const imageNo = String(era.id).padStart(2, '0');
    mapImage.src = `assets/era-maps/era-${imageNo}.png`;
    mapImage.alt = `${era.yr} ${era.title} 지도`;
  }

  KINGDOMS.forEach(k=>{
    const cfg = era.map[k];
    setKingdomState(k, cfg);
    showLabel(k, !!cfg);
    updateKing(k, null);
  });

  era.cards.filter(c=>!c.foreign).forEach(c=>{
    if(['silla','goguryeo','baekje'].includes(c.k)) updateKing(c.k, c.king);
  });

  ALL_FOREIGN.forEach(f=>{
    const el = document.getElementById('f-'+f);
    if(el) el.style.opacity = 0;
  });
  (era.foreign||[]).forEach(f=>{
    const el = document.getElementById('f-'+f);
    if(el) el.style.opacity = 1;
  });

  document.getElementById('cardsTitle').textContent = `📖 ${era.yr} — ${era.title}`;
  const storyArt = document.getElementById('storyArt');
  const storyArtImage = document.getElementById('storyArtImage');
  if(era.art){
    storyArt.style.display = 'block';
    storyArt.setAttribute('tabindex', '0');
    storyArt.setAttribute('role', 'button');
    storyArt.setAttribute('aria-label', '삽화 크게 보기');
    storyArtImage.src = era.art.src;
    storyArtImage.alt = era.art.alt || '';
  } else {
    storyArt.style.display = 'none';
    storyArt.removeAttribute('tabindex');
    storyArt.removeAttribute('role');
    storyArt.removeAttribute('aria-label');
    storyArtImage.removeAttribute('src');
    storyArtImage.alt = '';
  }
  const list = document.getElementById('cardList');
  list.innerHTML = '';
  era.cards.forEach(c=>{
    const div = document.createElement('div');
    const kingdomKey = c.foreign ? 'foreign' : c.k;
    div.className = `event-card c-${kingdomKey}` + (c.foreign ? ' foreign' : '');
    div.innerHTML = `
      ${c.foreign ? `<span class="foreign-note">🌏 다른 나라 이야기</span>` : ''}
      <div class="top-row">
        <img class="portrait-thumb" src="${portraitFor(c)}" alt="" aria-hidden="true">
        <div class="crest">${c.icon}</div>
        <div class="king-name">${c.king}</div>
        <div class="kingdom-chip">${KINGDOM_NAME[kingdomKey]}</div>
      </div>
      <p class="event-text">${c.text}</p>
    `;
    list.appendChild(div);
  });

  document.querySelectorAll('.era-btn').forEach((b,i)=>{ b.classList.toggle('active', i===current); });
  const activeBtn = document.querySelectorAll('.era-btn')[current];
  if(activeBtn) activeBtn.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
}

function setEra(i){
  current = Math.max(0, Math.min(ERAS.length-1, i));
  render();
}

document.getElementById('prevBtn').addEventListener('click', ()=> setEra(current-1));
document.getElementById('nextBtn').addEventListener('click', ()=> setEra(current+1));

const imageModal = document.getElementById('imageModal');
const imageModalImage = document.getElementById('imageModalImage');
const imageModalClose = document.getElementById('imageModalClose');
const storyArt = document.getElementById('storyArt');
function openImageModal(){
  const era = ERAS[current];
  if(!era.art) return;
  imageModalImage.src = era.art.src;
  imageModalImage.alt = era.art.alt || '';
  imageModal.classList.add('open');
  imageModalClose.focus();
}
function closeImageModal(){
  imageModal.classList.remove('open');
  imageModalImage.removeAttribute('src');
  imageModalImage.alt = '';
}
storyArt.addEventListener('click', openImageModal);
storyArt.addEventListener('keydown', e=>{
  if(e.key === 'Enter' || e.key === ' '){
    e.preventDefault();
    openImageModal();
  }
});
imageModalClose.addEventListener('click', closeImageModal);
imageModal.addEventListener('click', e=>{
  if(e.target === imageModal) closeImageModal();
});
document.addEventListener('keydown', e=>{
  if(e.key === 'Escape' && imageModal.classList.contains('open')) closeImageModal();
});

buildTimeline();
setEra(0);
</script>
</body>
</html>
